# wrangler config (only needed if you deploy via the CLI instead of the dashboard)
name = "zalturi-admin"
main = "zalturi-admin.js"
compatibility_date = "2024-11-01"

# KV: create a namespace, then paste its id here (or bind in the dashboard)
kv_namespaces = [
  { binding = "CONFIG", id = "1debb3c366324c28ae6d95f10dcbea06" }
]

# R2: the existing audio bucket, so the panel can list tracks
[[r2_buckets]]
binding = "AUDIO"
bucket_name = "zaltiri-audio"

# Secret (do NOT put the password here): set with
#   npx wrangler secret put ADMIN_PASSWORD
# or in the dashboard: Worker → Settings → Variables and Secrets.
